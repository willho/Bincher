kind = "web"
previewPath = "/"
title = "Penny Pincher"
version = "1.0.0"
id = "artifacts/penny-pincher"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23576

[services.development]
run = "pnpm --filter @workspace/penny-pincher run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/penny-pincher", "run", "build" ]
run = [ "node", "artifacts/penny-pincher/dist/index.cjs" ]

[services.env]
PORT = "23576"
BASE_PATH = "/"
SKIP_STARTUP_WIZARD = "true"
