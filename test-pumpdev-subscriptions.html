<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PumpDev Subscription Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #0a0a0a; color: #e5e5e5; padding: 20px; }
    h1 { margin-bottom: 20px; font-size: 18px; }
    .test { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .test h2 { font-size: 14px; margin-bottom: 10px; color: #60a5fa; }
    button { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }
    .messages { background: #0a0a0a; border: 1px solid #222; border-radius: 4px; padding: 10px; max-height: 250px; overflow-y: auto; margin-top: 10px; font-size: 11px; }
    .msg { padding: 4px 0; border-bottom: 1px solid #222; color: #888; }
    .msg.success { color: #4ade80; }
    .msg.error { color: #f87171; }
    .msg.data { color: #93c5fd; }
  </style>
</head>
<body>
  <h1>PumpDev Subscription Format Test</h1>
  <p style="color: #888; margin-bottom: 20px;">Test different subscription formats to see what PumpDev accepts.</p>

  <div class="test">
    <h2>Test 1: subscribeNewToken (no params)</h2>
    <button onclick="test1()">Start</button>
    <button onclick="stopAll()" class="stop">Stop</button>
    <div class="messages" id="test1"></div>
  </div>

  <div class="test">
    <h2>Test 2: subscribeNewToken + sample token mints</h2>
    <button onclick="test2()">Start</button>
    <button onclick="stopAll()" class="stop">Stop</button>
    <div class="messages" id="test2"></div>
  </div>

  <div class="test">
    <h2>Test 3: subscribeTokenTrade (all tokens)</h2>
    <button onclick="test3()">Start</button>
    <button onclick="stopAll()" class="stop">Stop</button>
    <div class="messages" id="test3"></div>
  </div>

  <script>
    let ws = null;

    function msg(testId, text, cls) {
      const el = document.getElementById(testId);
      if (el) {
        const div = document.createElement('div');
        div.className = `msg ${cls}`;
        div.textContent = text;
        el.appendChild(div);
        el.scrollTop = el.scrollHeight;
      }
    }

    function stopAll() {
      if (ws) { ws.close(); ws = null; }
    }

    function test1() {
      stopAll();
      const testId = 'test1';
      msg(testId, '>>> Connecting...', '');

      ws = new WebSocket('wss://pumpdev.io/ws');

      ws.onopen = () => {
        msg(testId, '✓ Connected', 'success');
        msg(testId, '>>> Sending: {"method":"subscribeNewToken"}', '');
        ws.send(JSON.stringify({ method: 'subscribeNewToken' }));
      };

      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          msg(testId, JSON.stringify(d).substring(0, 200), 'data');
        } catch {
          msg(testId, e.data.substring(0, 200), 'data');
        }
      };

      ws.onerror = () => msg(testId, '✗ Error', 'error');
      ws.onclose = () => msg(testId, '✗ Closed', 'error');

      setTimeout(() => { if (ws) { ws.close(); ws = null; } }, 15000);
    }

    function test2() {
      stopAll();
      const testId = 'test2';
      msg(testId, '>>> Connecting...', '');

      ws = new WebSocket('wss://pumpdev.io/ws');

      ws.onopen = () => {
        msg(testId, '✓ Connected', 'success');
        msg(testId, '>>> Sending: {"method":"subscribeNewToken","keys":[...mints]}', '');
        ws.send(JSON.stringify({
          method: 'subscribeNewToken',
          keys: [
            'DezXAZ8z7PnrnRJjgjG7P5KaufXo7QQXqVmWY8MyPrCR',
            'EPjFWaLb3odcccccccccccccccccccccccccccccccc',
            'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenEuw'
          ]
        }));
      };

      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          msg(testId, JSON.stringify(d).substring(0, 200), 'data');
        } catch {
          msg(testId, e.data.substring(0, 200), 'data');
        }
      };

      ws.onerror = () => msg(testId, '✗ Error', 'error');
      ws.onclose = () => msg(testId, '✗ Closed', 'error');

      setTimeout(() => { if (ws) { ws.close(); ws = null; } }, 15000);
    }

    function test3() {
      stopAll();
      const testId = 'test3';
      msg(testId, '>>> Connecting...', '');

      ws = new WebSocket('wss://pumpdev.io/ws');

      ws.onopen = () => {
        msg(testId, '✓ Connected', 'success');
        msg(testId, '>>> Sending: {"method":"subscribeTokenTrade"}', '');
        ws.send(JSON.stringify({ method: 'subscribeTokenTrade' }));
      };

      ws.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          msg(testId, JSON.stringify(d).substring(0, 200), 'data');
        } catch {
          msg(testId, e.data.substring(0, 200), 'data');
        }
      };

      ws.onerror = () => msg(testId, '✗ Error', 'error');
      ws.onclose = () => msg(testId, '✗ Closed', 'error');

      setTimeout(() => { if (ws) { ws.close(); ws = null; } }, 15000);
    }
  </script>
</body>
</html>
